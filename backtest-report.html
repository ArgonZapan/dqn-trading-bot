<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtest Results - Equity Curve</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.4rem; color: #58a6ff; }
        .stats { display: flex; gap: 16px; }
        .stat { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 16px 24px; text-align: center; }
        .stat-label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; margin-bottom: 6px; }
        .stat-value { font-size: 1.3rem; font-weight: 700; }
        .stat-value.pos { color: #3fb950; }
        .stat-value.neg { color: #f85149; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 20px; }
        .card-header { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; border-bottom: 1px solid #30363d; padding-bottom: 12px; }
        canvas { width: 100% !important; }
        .chart-container { position: relative; height: 280px; }
        .legend { display: flex; gap: 20px; font-size: 0.75rem; margin-top: 12px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .trade-list { max-height: 200px; overflow-y: auto; font-size: 0.75rem; }
        .trade-row { display: grid; grid-template-columns: 60px 60px 80px 80px; padding: 8px 12px; border-bottom: 1px solid #21262d; }
        .trade-row.header { color: #8b949e; font-size: 0.65rem; text-transform: uppercase; }
        .trade-row.buy { color: #3fb950; }
        .trade-row.sell { color: #f85149; }
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .summary-item { background: #0d1117; border-radius: 10px; padding: 14px; text-align: center; }
        .summary-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; margin-bottom: 6px; }
        .summary-value { font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Backtest Results: BTCUSDT</h1>
        <div class="stats">
            <div class="stat">
                <div class="stat-label">Final Equity</div>
                <div class="stat-value pos">$1000.38</div>
            </div>
            <div class="stat">
                <div class="stat-label">P&L</div>
                <div class="stat-value pos">+0.04%</div>
            </div>
        </div>
    </div>

    <div class="summary-grid" style="margin-bottom: 20px;">
        <div class="summary-item">
            <div class="summary-label">Total Trades</div>
            <div class="summary-value">1</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">Win Rate</div>
            <div class="summary-value">0.0%</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">Max Drawdown</div>
            <div class="summary-value" style="color: #f0883e">0.22%</div>
        </div>
        <div class="summary-item">
            <div class="summary-label">Sharpe Ratio</div>
            <div class="summary-value">0.42</div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">📈 Equity Curve vs Benchmark</div>
            <div class="chart-container">
                <canvas id="equityChart"></canvas>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background: #3fb950"></div> Strategy</div>
                <div class="legend-item"><div class="legend-dot" style="background: #58a6ff"></div> Buy & Hold</div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">📉 Drawdown</div>
            <div class="chart-container">
                <canvas id="drawdownChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid">
        <div class="card">
            <div class="card-header">💰 Price Chart with Trades</div>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
        <div class="card">
            <div class="card-header">📋 Trade Log</div>
            <div class="trade-list">
                <div class="trade-row header">
                    <span>Type</span>
                    <span>Price</span>
                    <span>P&L</span>
                    <span>Cum. Equity</span>
                </div>
                
                
                <div class="trade-row buy">
                    <span>BUY</span>
                    <span>$70308.58</span>
                    <span>-</span>
                    <span>$1000.00</span>
                </div>
                
            </div>
        </div>
    </div>

                datasets: [{
                    label: 'Strategy',
                    data: [1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000,1000.8030101020387,1000.987176813982,1001.1833690852525,1001.2544414920626,1001.4064499667039,1001.9004437296272,1002.523746034979,1002.3093127467516,1001.9546263059218,1001.2864646107203,1001.089191390297,1001.7780262380495,1001.4730634582579,1001.6634456278309,1001.646285560027,1001.5190037972607,1001.4255016955257,1000.8078743732273,1000.3002336272473],

                datasets: [{

                    borderColor: '#f0883e',
                    backgroundColor: 'rgba(240, 136, 62, 0.2)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        grid: { color: '#21262d' },

                }
            }
        });

        const priceCtx = document.getElementById('priceChart').getContext('2d');
        const priceLabels = ["4:25:00 PM","4:30:00 PM","4:35:00 PM","4:40:00 PM","4:45:00 PM","4:50:00 PM","4:55:00 PM","5:00:00 PM","5:05:00 PM","5:10:00 PM","5:15:00 PM","5:20:00 PM","5:25:00 PM","5:30:00 PM","5:35:00 PM","5:40:00 PM","5:45:00 PM","5:50:00 PM","5:55:00 PM","6:00:00 PM","6:05:00 PM","6:10:00 PM","6:15:00 PM","6:20:00 PM","6:25:00 PM","6:30:00 PM","6:35:00 PM","6:40:00 PM","6:45:00 PM","6:50:00 PM","6:55:00 PM","7:00:00 PM","7:05:00 PM","7:10:00 PM","7:15:00 PM","7:20:00 PM","7:25:00 PM","7:30:00 PM","7:35:00 PM","7:40:00 PM"];
        const buyIdxs = [19];
        const sellIdxs = [];
        
        new Chart(priceCtx, {
            type: 'line',
            data: {
                labels: priceLabels,
                datasets: [{
                    label: 'BTC Price',
                    data: [70414.32,70466.84,70426.45,70371.22,70414.78,70370.43,70301.66,70360.87,70253.38,70279.1,70292.33,70374.78,70368.48,70399.23,70415.96,70388.23,70373.39,70319.03,70304.08,70308.58,70368.01,70381.64,70396.16,70401.42,70412.67,70449.23,70495.36,70479.49,70453.24,70403.79,70389.19,70440.17,70417.6,70431.69,70430.42,70421,70414.08,70368.37,70330.8,70336.82],
                    borderColor: '#c9d1d9',
                    backgroundColor: 'rgba(201, 209, 217, 0.1)',
                    fill: false,
                    tension: 0.1,
                    pointRadius: 0
                }, {
                    label: 'Buy',
                    data: buyIdxs.map(i => ({ x: i, y: [70308.58][buyIdxs.indexOf(i)] })),
                    borderColor: '#3fb950',
                    pointRadius: 6,
                    pointStyle: 'triangle',
                    showLine: false
                }, {
                    label: 'Sell',
                    data: sellIdxs.map(i => ({ x: i, y: [][sellIdxs.indexOf(i)] })),
                    borderColor: '#f85149',
                    pointRadius: 6,
                    pointStyle: 'triangle',
                    showLine: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } }
                }
            }
        });
    </script>
</body>
</html>
