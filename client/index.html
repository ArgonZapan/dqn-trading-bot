<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DQN Bot</title>
<style>
body{font-family:Segoe UI,sans-serif;background:#0a0e17;color:#e6edf3}
.header{background:linear-gradient(135deg,#161b22,#1f2937;padding:20px 24px;border-bottom:1px solid #30363d}
.header h1{color:#58a6ff;font-size:1.5rem}
.container{display:grid;grid-template-columns:1fr 320px;gap:20px;padding:20px;max-width:1600px;margin:0 auto}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
.card-header{padding:14px 18px;background:#1c2128;border-bottom:1px solid #30363d;font-size:.8rem;text-transform:uppercase;color:#8b949e;font-weight:600}
.card-body{padding:18px}
.prices{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
.price-box{background:#0d1117;border-radius:10px;padding:20px;text-align:center}
.price-label{font-size:.8rem;color:#8b949e}
.price-value{font-size:1.6rem;font-weight:700;margin-top:8px}
.metric{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #21262d}
.metric:last-child{border:none}
.metric-label{color:#8b949e}
.metric-value{font-weight:600}
.green{color:#3fb950}
.red{color:#f85149}
.blue{color:#58a6ff}
.btn{background:#238636;color:#fff;border:none;padding:14px 20px;border-radius:8px;cursor:pointer;width:100%;font-size:.9rem;font-weight:600}
.btn:hover{background:#2ea043}
.btn.stop{background:#da3633}
.logs{background:#0d1117;border-radius:8px;padding:12px;height:100px;overflow-y:auto;font-family:monospace;font-size:.75rem}
.log-entry{margin-bottom:4px;padding:4px 8px;border-radius:4px}
.log-entry.info{background:#1f2937;color:#8b949e}
.log-entry.buy{background:rgba(63,185,80,0.2);color:#3fb950}
.log-entry.sell{background:rgba(248,81,73,0.2);color:#f85149}
.progress{background:#21262d;height:6px;border-radius:3px;margin-top:10px}
.progress-fill{height:100%;background:linear-gradient(90deg,#238636,#3fb950;border-radius:3px;transition:width .3s}
@media(max-width:900px){.container{grid-template-columns:1fr}.prices{grid-template-columns:1fr}
</style>
</head>
<body>
<div class="header">
<h1>🤖 DQN Trading Bot | Status: <span id="status style="color:#3fb950">Łączenie...</span></div>
<div class="container">
<div class="main">
<div class="card">
<div class="card-header">📈 Ceny Live</div>
<div class="card-body">
<div class="prices">
<div class="price-box btc">
<div class="price-label">BTC/USDT</div>
<div class="price-value" id="btc">--</div>
<div class="price-change" id="btcChange">--</div>
</div>
<div class="price-box eth">
<div class="price-label">ETH/USDT</div>
<div class="price-value" id="eth">--</div>
<div class="price-change" id="ethChange">--</div>
</div>
<div class="price-box sol">
<div class="price-label">SOL/USDT</div>
<div class="price-value" id="sol">--</div>
<div class="price-change" id="solChange">--</div>
</div>
</div>
</div>
<div class="card" style="margin-top:20px">
<div class="card-header">📋 Logi</div>
<div class="card-body">
<div class="logs" id="logs"></div>
</div>
</div>
</div>
<div class="sidebar">
<div class="card">
<div class="card-header">⚙️ Sterowanie</div>
<div class="card-body">
<button class="btn" id="startBtn">▶ START</button>
</div>
</div>
<div class="card" style="margin-top:15px">
<div class="card-header">🧠 Agent</div>
<div class="card-body">
<div class="metric"><span class="metric-label">Epsilon</span><span class="metric-value blue" id="epsilon">1.000</span></div>
<div class="metric"><span class="metric-label">Episode</span><span id="episode">0</span></div>
<div class="metric"><span class="metric-label">Buffer</span><span id="buffer">0</span></div>
<div class="metric"><span class="metric-label">Loss</span><span id="loss">--</span></div>
<div class="progress"><div class="progress-fill" id="epsilonBar" style="width:100%"></div></div>
</div>
</div>
<div class="card" style="margin-top:15px">
<div class="card-header">💼 Portfolio</div>
<div class="card-body">
<div class="metric"><span class="metric-label">USDT</span><span class="metric-value green" id="usdt">$1000</span></div>
<div class="metric"><span class="metric-label">BTC</span><span id="btcHold">0</span></div>
<div class="metric"><span class="metric-label">Total</span><span class="metric-value green" id="total">$1000</span></div>
</div>
</div>
</div>
<script>
let trading=false;
function log(msg,type='info'){const el=document.getElementById('logs');const d=document.createElement('div');d.className='log-entry '+type;d.textContent=new Date().toLocaleTimeString()+' '+msg;el.appendChild(d);el.scrollTop=el.scrollHeight;if(el.children.length>50)el.removeChild(el.firstChild)}
async function update(){
try {
const [p,m,b] = await Promise.all([
fetch('/api/prices').then(r=>r.json()),
fetch('/api/metrics').then(r=>r.json()),
fetch('/api/portfolio').then(r=>r.json())
]);
document.getElementById('btc').textContent='$'+p.btc.toLocaleString();
document.getElementById('loss').textContent=m.avgLoss?.toFixed(6)||'--';
document.getElementById('episode').textContent=m.episode||0;
document.getElementById('buffer').textContent=m.bufferSize||0;
document.getElementById('epsilon').textContent=(m.epsilon||1).toFixed(3);
document.getElementById('epsilonBar').style.width=((m.epsilon||1)*100+'%');
document.getElementById('total').textContent='$'+(b.total||1000).toFixed(2);
} catch(e){log('Błąd: '+e.message,'sell')}
}
setInterval(update,2000);
log('Dashboard ready','info');
update();
document.getElementById('startBtn').onclick=()=>{
trading=!trading;
const b=document.getElementById('startBtn');
b.textContent=trading?'⏹ STOP':'▶ START';
b.className=trading?'btn stop':'btn';
};
</script>
</body>
</html>
