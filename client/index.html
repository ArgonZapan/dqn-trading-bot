<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DQN Trading Bot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e17; color: #e6edf3; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #161b22, #1f2937); padding: 20px 24px; border-bottom: 1px solid #30363d; }
        .header h1 { color: #58a6ff; font-size: 1.5rem; }
        .header .info { display: flex; gap: 20px; margin-top: 8px; font-size: 0.85rem; color: #8b949e; }
        .header .online { color: #3fb950; }
        
        .container { display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 20px; max-width: 1600px; margin: 0 auto; }
        
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
        .card-header { padding: 14px 18px; background: #1c2128; border-bottom: 1px solid #30363d; font-size: 0.8rem; text-transform: uppercase; color: #8b949e; font-weight: 600; }
        .card-body { padding: 18px; }
        
        .prices { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .price-box { background: #0d1117; border-radius: 10px; padding: 18px; text-align: center; transition: transform 0.2s; }
        .price-box:hover { transform: translateY(-2px); }
        .price-box.btc { border: 2px solid #f7931a; }
        .price-box.eth { border: 2px solid #627eea; }
        .price-box.sol { border: 2px solid #14f195; }
        .price-label { font-size: 0.8rem; color: #8b949e; }
        .price-value { font-size: 1.5rem; font-weight: 700; margin-top: 8px; }
        .price-change { font-size: 0.85rem; margin-top: 5px; }
        .price-change.up { color: #3fb950; }
        .price-change.down { color: #f85149; }
        
        .chart { height: 250px; background: #0d1117; border-radius: 8px; margin-top: 15px; }
        
        .metric { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #21262d; }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #8b949e; }
        .metric-value { font-weight: 600; }
        .metric-value.green { color: #3fb950; }
        .metric-value.red { color: #f85149; }
        .metric-value.blue { color: #58a6ff; }
        
        .btn { background: #238636; color: #fff; border: none; padding: 14px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .btn:hover { background: #2ea043; }
        .btn.stop { background: #da3633; }
        .btn.stop:hover { background: #f85149; }
        
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; background: #21262d; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .mode-btn.active { background: rgba(56, 139, 253, 0.2); border-color: #58a6ff; color: #58a6ff; }
        
        .logs { background: #0d1117; border-radius: 8px; padding: 12px; height: 100px; overflow-y: auto; font-size: 0.75rem; font-family: monospace; }
        .log-entry { margin-bottom: 4px; padding: 4px 8px; border-radius: 4px; }
        .log-entry.buy { background: rgba(63, 185, 80, 0.2); color: #3fb950; }
        .log-entry.sell { background: rgba(248, 81, 73, 0.2); color: #f85149; }
        .log-entry.info { background: #1f2937; color: #8b949e; }
        
        .progress { background: #21262d; height: 6px; border-radius: 3px; margin-top: 10px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #238636, #3fb950); border-radius: 3px; transition: width 0.3s; }
        
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } .prices { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 DQN Trading Bot</h1>
        <div class="info">
            <span>Status: <span class="online" id="status">Łączenie...</span></span>
            <span>Trades: <span id="tradeCount">0</span></span>
            <span>Mode: <span id="mode">PAPER</span></span>
        </div>
    </div>
    
    <div class="container">
        <div class="main">
            <div class="card">
                <div class="card-header">📈 Ceny Live</div>
                <div class="card-body">
                    <div class="prices">
                        <div class="price-box btc">
                            <div class="price-label">BTC/USDT</div>
                            <div class="price-value" id="btc">--</div>
                            <div class="price-change" id="btcChange">--</div>
                        </div>
                        <div class="price-box eth">
                            <div class="price-label">ETH/USDT</div>
                            <div class="price-value" id="eth">--</div>
                            <div class="price-change" id="ethChange">--</div>
                        </div>
                        <div class="price-box sol">
                            <div class="price-label">SOL/USDT</div>
                            <div class="price-value" id="sol">--</div>
                            <div class="price-change" id="solChange">--</div>
                        </div>
                    </div>
                    <div class="chart"><canvas id="chart"></canvas></div>
                </div>
            </div>
            
            <div class="card" style="margin-top: 20px;">
                <div class="card-header">📋 Logi</div>
                <div class="card-body"><div class="logs" id="logs"></div></div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="card">
                <div class="card-header">⚙️ Sterowanie</div>
                <div class="card-body">
                    <div class="mode-toggle">
                        <button class="mode-btn active" id="paperBtn">PAPER</button>
                        <button class="mode-btn" id="liveBtn">LIVE ⚠️</button>
                    </div>
                    <button class="btn" id="startBtn">▶ START TRADING</button>
                </div>
            </div>
            
            <div class="card" style="margin-top: 15px;">
                <div class="card-header">🧠 Metryki Agenta</div>
                <div class="card-body">
                    <div class="metric">
                        <span class="metric-label">Epsilon (ε)</span>
                        <span class="metric-value blue" id="epsilon">1.000</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Episode</span>
                        <span class="metric-value" id="episode">0</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Buffer</span>
                        <span class="metric-value" id="buffer">0</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Loss</span>
                        <span class="metric-value" id="loss">--</span>
                    </div>
                    <div class="progress"><div class="progress-fill" id="epsilonBar" style="width: 100%"></div></div>
                </div>
            </div>
            
            <div class="card" style="margin-top: 15px;">
                <div class="card-header">💼 Portfolio</div>
                <div class="card-body">
                    <div class="metric">
                        <span class="metric-label">USDT</span>
                        <span class="metric-value green" id="usdt">$1000</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">BTC</span>
                        <span class="metric-value" id="btcHold">0</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Wartość</span>
                        <span class="metric-value green" id="total">$1000</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API = '';
        let prices = { btc: 0, eth: 0, sol: 0 };
        let history = [];
        let trading = false;
        
        // Chart
        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'BTC',
                    data: [],
                    borderColor: '#f7931a',
                    backgroundColor: 'rgba(247,147,26,0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.1,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { grid: { color: '#21262d' }, ticks: { color: '#8b949e' } }
                }
            }
        });
        
        function log(msg, type = 'info') {
            const el = document.getElementById('logs');
            const d = document.createElement('div');
            d.className = 'log-entry ' + type;
            d.textContent = new Date().toLocaleTimeString() + ' ' + msg;
            el.appendChild(d);
            el.scrollTop = el.scrollHeight;
            if (el.children.length > 50) el.removeChild(el.firstChild);
        }
        
        async function update() {
            try {
                // Prices
                const [priceRes, metricsRes, portfolioRes] = await Promise.all([
                    fetch(API + '/api/prices'),
                    fetch(API + '/api/metrics'),
                    fetch(API + '/api/portfolio')
                ]);
                
                const p = await priceRes.json();
                prices = p;
                document.getElementById('btc').textContent = p.btc ? '$' + p.btc.toLocaleString() : '--';
                document.getElementById('eth').textContent = p.eth ? '$' + p.eth.toLocaleString() : '--';
                document.getElementById('sol').textContent = p.sol ? '$' + p.sol.toLocaleString() : '--';
                
                if (p.btc > 0) {
                    history.push(p.btc);
                    if (history.length > 60) history.shift();
                    chart.data.labels = history.map((_, i) => i);
                    chart.data.datasets[0].data = history;
                    chart.update('none');
                }
                
                // Metrics
                const m = await metricsRes.json();
                document.getElementById('epsilon').textContent = m.epsilon?.toFixed(3) || '--';
                document.getElementById('episode').textContent = m.episode || 0;
                document.getElementById('buffer').textContent = m.bufferSize || 0;
                document.getElementById('loss').textContent = m.avgLoss?.toFixed(6) || '--';
                document.getElementById('epsilonBar').style.width = ((m.epsilon || 1) * 100) + '%';
                
                // Portfolio
                const port = await portfolioRes.json();
                document.getElementById('usdt').textContent = '$' + (port.usdt || 0).toFixed(2);
                document.getElementById('btcHold').textContent = (port.btc || 0).toFixed(6);
                const total = (port.usdt || 0) + (port.btc || 0) * p.btc;
                document.getElementById('total').textContent = '$' + total.toFixed(2);
                
                // Status
                const statusRes = await fetch(API + '/api/status');
                const status = await statusRes.json();
                document.getElementById('tradeCount').textContent = status.tradesCount || 0;
                document.getElementById('status').textContent = status.tradingActive ? '🟢 Aktywny' : '⚪ Gotowy';
                
            } catch (e) {
                log('Błąd połączenia', 'info');
            }
        }
        
        // Init
        log('Dashboard initialized', 'info');
        update();
        setInterval(update, 2000);
        
        // Controls
        document.getElementById('paperBtn').onclick = () => {
            document.getElementById('paperBtn').classList.add('active');
            document.getElementById('liveBtn').classList.remove('active');
            document.getElementById('mode').textContent = 'PAPER';
            log('Tryb: PAPER', 'info');
        };
        
        document.getElementById('liveBtn').onclick = () => {
            if (confirm('⚠️ LIVE TRADING wykonuje REALNE zlecenia! Na pewno?')) {
                document.getElementById('liveBtn').classList.add('active');
                document.getElementById('paperBtn').classList.remove('active');
                document.getElementById('mode').textContent = 'LIVE ⚠️';
                log('Tryb: LIVE TRADING ⚠️', 'sell');
            }
        };
        
        document.getElementById('startBtn').onclick = async () => {
            trading = !trading;
            const btn = document.getElementById('startBtn');
            if (trading) {
                btn.textContent = '⏹ STOP';
                btn.classList.add('stop');
                await fetch(API + '/api/trading/start');
                log('Trading started', 'buy');
            } else {
                btn.textContent = '▶ START TRADING';
                btn.classList.remove('stop');
                await fetch(API + '/api/trading/stop');
                log('Trading stopped', 'info');
            }
        };
    </script>
</body>
</html>
